services:
  postgres:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: apartapatia/kittygram_backend:${TAG}
    restart: always
    pull_policy: always
    env_file: .env
    volumes:
      - static:/app/collected_static
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: apartapatia/kittygram_frontend:${TAG}
    pull_policy: always
    env_file: .env
    volumes:
      - static:/static

  gateway:
    image: apartapatia/kittygram_gateway:${TAG}
    restart: always
    pull_policy: always
    ports:
      - "80:80"
    volumes:
      - static:/static
      - media:/app/media
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  static:
  media: