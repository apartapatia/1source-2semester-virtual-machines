---
- name: Ensure app directory exists
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ ansible_user | default(ansible_env.USER) }}"
    group: "{{ ansible_user | default(ansible_env.USER) }}"
    mode: '0755'
  tags: 
    - setup

- name: Install common system utilities
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - ca-certificates  
    state: present
    update_cache: true
    
- name: Install pip for Python 3
  ansible.builtin.apt:
    name: python3-pip
    state: present
    
- name: Install Docker Python dependencies for Ansible
  ansible.builtin.pip:
    name:
      - docker
      - requests
    state: present
