---
- name: Ensure app directory exists
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  tags: 
    - setup

- name: Install common system utilities
  apt:
    name:
      - curl
      - wget
      - vim
      - ca-certificates  
    state: present
    
- name: Install pip for Python 3
  apt:
    name: python3-pip
    state: present
    update_cache: yes