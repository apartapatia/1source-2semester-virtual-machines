- name: Deploy Kittygram
  hosts: all
  become: true
  vars:
    db_user: "{{ lookup('env', 'POSTGRES_USER') }}"
    db_password: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
    secret_key: "{{ lookup('env', 'SECRET_KEY') }}"
    docker_tag: "latest"

  tasks:
    - name: Create .env file with secrets
      ansible.builtin.template:
        src: "env.j2"
        dest: "{{ app_dir }}/.env"
        mode: '0600'

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../kittygram/docker-compose.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: '0644'

    - name: Pull and Up Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        pull: always
        recreate: always

    - name: Wait for services to be ready
      ansible.builtin.wait_for:
        port: 80
        host: "{{ ansible_host | default(inventory_hostname) }}"
        delay: 10
        timeout: 60

    - name: Run Django migrations
      community.docker.docker_compose_v2_exec:
        project_src: "{{ app_dir }}"
        service: backend
        command: python manage.py migrate
      register: migrate_result
      retries: 3
      delay: 10
      until: migrate_result is not failed

    - name: Collect static files
      community.docker.docker_compose_v2_exec:
        project_src: "{{ app_dir }}"
        service: backend
        command: python manage.py collectstatic --noinput
      register: collectstatic_result
      retries: 3
      delay: 10
      until: collectstatic_result is not failed
