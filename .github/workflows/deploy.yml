name: Kittygram Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint Backend
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt flake8

      - name: Run Flake8
        run: flake8 backend

  frontend_tests:
    name: Test Frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm run test

  build_and_push:
    name: Build and Push Docker
    runs-on: ubuntu-latest
    needs: [lint, frontend_tests]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./backend
            image: kittygram_backend
          - context: ./frontend
            image: kittygram_frontend
          - context: ./nginx
            image: kittygram_gateway
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  get_infrastructure_state:
    name: Infrastructure Check
    runs-on: ubuntu-latest
    needs: [build_and_push]
    environment: production
    timeout-minutes: 20
    outputs:
      vm_ip: ${{ steps.extract_outputs.outputs.vm_ip }}
      vm_username: ${{ steps.extract_outputs.outputs.vm_username }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_cloud_id: ${{ secrets.TF_VAR_cloud_id }}
          TF_VAR_folder_id: ${{ secrets.TF_VAR_folder_id }}
          YC_SERVICE_ACCOUNT_KEY_FILE: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_FILE }}
        run: terraform init
      
      - name: Extract VM Outputs
        id: extract_outputs
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          VM_IP=$(terraform output -raw vm_public_ip)
          VM_USERNAME=$(terraform output -raw vm_username)
          if [ -z "$VM_IP" ] || [ -z "$VM_USERNAME" ]; then
            echo "Failed to extract VM IP or username from terraform output"
            exit 1
          fi
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT
          echo "vm_username=$VM_USERNAME" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build_and_push, get_infrastructure_state]
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Install Ansible
        run: pip install "ansible-core>=2.15" "ansible<10"

      - name: Run Provision Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i deploy/ansible/inventory/hosts.yml \
            -e "target_ip=${{ needs.get_infrastructure_state.outputs.vm_ip }}" \
            -e "target_user=${{ needs.get_infrastructure_state.outputs.vm_username }}" \
            deploy/ansible/provision.yml

      - name: Run Deploy Playbook
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i deploy/ansible/inventory/hosts.yml \
            -e "target_ip=${{ needs.get_infrastructure_state.outputs.vm_ip }}" \
            -e "target_user=${{ needs.get_infrastructure_state.outputs.vm_username }}" \
            deploy/ansible/deploy.yml

  autotests:
    name: Autotests
    runs-on: ubuntu-24.04
    needs: [deploy, get_infrastructure_state]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set dynamic VM IP in tests.yml
        run: |
          sed -i "s|kittygram_domain: .*|kittygram_domain: http://${{ needs.get_infrastructure_state.outputs.vm_ip }}|g" tests.yml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Run tests
        run: pytest -c tests.yml tests

      - name: Output tests.yml to Summary
        if: always()
        run: |
          echo "### Generated tests.yml" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          cat tests.yml >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload tests.yml Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-yml-config
          path: tests.yml

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, frontend_tests, build_and_push, get_infrastructure_state, deploy, autotests]
    steps:
      - name: Checkout actions
        uses: actions/checkout@v4

      - name: Send Notification
        uses: ./.github/actions/notify
        with:
          status: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_TO }}
          topic_id: ${{ secrets.TELEGRAM_TOPIC_ID }}
          site_url: ${{ needs.get_infrastructure_state.outputs.vm_ip && format('http://{0}', needs.get_infrastructure_state.outputs.vm_ip) || '' }}
