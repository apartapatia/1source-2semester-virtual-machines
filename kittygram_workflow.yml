name: Kittygram CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Select the Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint Backend
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt flake8

      - name: Run Flake8
        run: flake8 backend

  frontend_tests:
    name: Test Frontend
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm run test

  build_and_push:
    name: Build and Push Docker
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    needs: [lint, frontend_tests]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./backend
            image: kittygram_backend
          - context: ./frontend
            image: kittygram_frontend
          - context: ./nginx
            image: kittygram_gateway
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform_plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TF_ACTION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action || 'apply' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_cloud_id: ${{ secrets.TF_VAR_cloud_id }}
      TF_VAR_folder_id: ${{ secrets.TF_VAR_folder_id }}
      YC_SERVICE_ACCOUNT_KEY_FILE: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_FILE }}
    outputs:
      execution_action: ${{ steps.plan.outputs.execution_action }}
      plan_file: ${{ steps.plan.outputs.plan_file }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          case "${{ env.TF_ACTION }}" in
            plan)
              terraform plan -no-color
              echo "execution_action=plan" >> "$GITHUB_OUTPUT"
              echo "plan_file=" >> "$GITHUB_OUTPUT"
              ;;
            apply)
              terraform plan -out=tfplan -no-color
              echo "execution_action=apply" >> "$GITHUB_OUTPUT"
              echo "plan_file=tfplan" >> "$GITHUB_OUTPUT"
              ;;
            destroy)
              terraform plan -destroy -out=tfplan -no-color
              echo "execution_action=destroy" >> "$GITHUB_OUTPUT"
              echo "plan_file=tfplan" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported action: ${{ env.TF_ACTION }}" >&2
              exit 1
              ;;
          esac

      - name: Upload Terraform Plan Artifact
        if: steps.plan.outputs.plan_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/tfplan

  terraform_execute:
    name: Terraform Execute
    runs-on: ubuntu-latest
    needs: terraform_plan
    if: needs.terraform_plan.outputs.execution_action == 'apply' || needs.terraform_plan.outputs.execution_action == 'destroy'
    environment: production
    defaults:
      run:
        working-directory: infra
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_cloud_id: ${{ secrets.TF_VAR_cloud_id }}
      TF_VAR_folder_id: ${{ secrets.TF_VAR_folder_id }}
      YC_SERVICE_ACCOUNT_KEY_FILE: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_FILE }}
    outputs:
      vm_ip: ${{ steps.extract_ip.outputs.vm_ip }}
      vm_username: ${{ steps.extract_ip.outputs.vm_username }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: infra

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Execute Planned Changes
        id: apply
        run: terraform apply -no-color tfplan

      - name: Extract VM outputs
        if: needs.terraform_plan.outputs.execution_action == 'apply'
        id: extract_ip
        run: |
          echo "vm_ip=$(terraform output -raw vm_public_ip)" >> $GITHUB_OUTPUT
          echo "vm_username=$(terraform output -raw vm_username)" >> $GITHUB_OUTPUT
      
      # временная затычка
      - name: Sleep for 2 minutes to let cloud init finish
        if: needs.terraform_plan.outputs.execution_action == 'apply'
        run: sleep 120

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [terraform_execute, build_and_push]
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Install Ansible
        run: pip install "ansible-core>=2.15" "ansible<10"

      - name: Run Provision Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i deploy/ansible/inventory/hosts.yml \
            -e "target_ip=${{ needs.terraform_execute.outputs.vm_ip }}" \
            -e "target_user=${{ needs.terraform_execute.outputs.vm_username }}" \
            deploy/ansible/provision.yml

      - name: Run Deploy Playbook
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i deploy/ansible/inventory/hosts.yml \
            -e "target_ip=${{ needs.terraform_execute.outputs.vm_ip }}" \
            -e "target_user=${{ needs.terraform_execute.outputs.vm_username }}" \
            deploy/ansible/deploy.yml

  autotests:
    name: Autotests
    runs-on: ubuntu-24.04
    needs: [deploy, terraform_execute]
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set dynamic VM IP in tests.yml
        run: |
          sed -i "s|kittygram_domain: .*|kittygram_domain: http://${{ needs.terraform_execute.outputs.vm_ip }}|g" tests.yml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Run tests
        run: pytest -c tests.yml tests

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, frontend_tests, build_and_push, terraform_plan, terraform_execute, deploy, autotests]
    steps:
      - name: Checkout actions
        uses: actions/checkout@v4

      - name: Send Notification
        uses: ./.github/actions/notify
        with:
          status: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_TO }}
          topic_id: ${{ secrets.TELEGRAM_TOPIC_ID }}
          site_url: http://${{ needs.terraform_execute.outputs.vm_ip }}